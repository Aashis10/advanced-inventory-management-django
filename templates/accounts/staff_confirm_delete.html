{% extends 'base.html' %}

{% block content %}
<div class="panel">
    <h4 class="mb-3">Remove Staff Account</h4>
    <p>Are you sure you want to remove <strong>{{ staff_user.username }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button class="btn btn-danger-modern" type="submit">Yes, Remove</button>
        <a href="{% url 'accounts:staff_list' %}" class="btn btn-outline-modern">Cancel</a>
    </form>
</div>
{% endblock %}
