{% extends 'base.html' %}

{% block content %}
<div class="panel form-panel">
    <h3>{{ title }}</h3>
    <form method="post" class="row g-3">{% csrf_token %}
        {% for field in form %}
        <div class="col-md-6">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
            {% if field.help_text %}<small class="text-muted d-block">{{ field.help_text }}</small>{% endif %}
            {% if field.errors %}<div class="text-danger small">{{ field.errors|striptags }}</div>{% endif %}
        </div>
        {% endfor %}
        <div class="col-12">
            <button class="btn btn-primary-modern" type="submit"><i class="fa-solid fa-floppy-disk"></i>Save Purchase</button>
            <a href="{% url 'purchases:list' %}" class="btn btn-outline-modern">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
